<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Charles & Shivaan Chatbot</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    #chat { width: 100%; max-width: 600px; margin: auto; }
    input, button { padding: 0.5rem; margin: 0.5rem 0; width: 100%; }
    .message { margin: 0.5rem 0; }
  </style>
</head>
<body>
  <h1>Charles & Shivaan Chatbot</h1>
  <div id="chat"></div>
  <input id="input" placeholder="Type your message..." />
  <button id="send">Send</button>

  <script>
    const chatDiv = document.getElementById("chat");
    const input = document.getElementById("input");
    const send = document.getElementById("send");

    send.onclick = async () => {
      const message = input.value;
      if (!message) return;

      const div = document.createElement("div");
      div.textContent = "You: " + message;
      div.className = "message";
      chatDiv.appendChild(div);

      input.value = "";
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
      const data = await response.json();
      const botDiv = document.createElement("div");
      botDiv.textContent = "Bot: " + (data.reply || data.error);
      botDiv.className = "message";
      chatDiv.appendChild(botDiv);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    };
  </script>
</body>
</html>
